name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "english-grammar-poster.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp english-grammar-poster.html _site/index.html

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
